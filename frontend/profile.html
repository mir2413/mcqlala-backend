<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - MCQLala</title>
    <link rel="stylesheet" href="style.css?v=1774346226095">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=1774346226095" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous">
    
    <link rel="stylesheet" href="profile_inline.css?v=1774346226095">
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand" data-href="index.html" style="cursor:pointer;" style="cursor: pointer;">
            <img src="logo.svg" alt="MCQLala" class="logo-box">
            <div class="brand-text">
                <h1>mcqlala</h1>
                <p>Profile & Stats</p>
            </div>
        </div>
        <ul class="nav-links" id="navLinks"></ul>
        <div class="hamburger" data-onclick="toggleMobileMenu"><i class="fa-solid fa-bars"></i></div>
    </nav>

    <div class="profile-header">
        <div class="profile-avatar"><i class="fa-solid fa-user"></i></div>
        <h2 id="profileUsername">Loading...</h2>
        <p>Member</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div style="color: #667eea;"><i class="fa-solid fa-clipboard-check fa-2x"></i></div>
            <div class="stat-number" id="totalQuizzes">0</div>
            <div style="color: #777;">Quizzes Taken</div>
        </div>
        <div class="stat-card">
            <div style="color: #21cc12;"><i class="fa-solid fa-chart-line fa-2x"></i></div>
            <div class="stat-number" id="avgScore">0%</div>
            <div style="color: #777;">Average Score</div>
        </div>
    </div>

    <div class="history-container">
        <h3 style="margin-bottom: 15px; color: #333;">Recent Quiz History</h3>
        <table>
            <thead><tr><th>Topic</th><th>Date</th><th>Score</th></tr></thead>
            <tbody id="quizHistoryBody"></tbody>
        </table>
    </div>

    <script src="app.js?v=1774349000000"></script>
    
    <script src="profile_inline.js?v=1774346226095"></script>
</body>
</html>
