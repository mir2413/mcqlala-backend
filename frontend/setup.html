<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Quiz - mcqlala</title>
    <link rel="stylesheet" href="style.css?v=1774346226095">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous">
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F172A">
    <meta name="robots" content="noindex, nofollow">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand" id="navBrand">
            <img src="favicon.svg?v=3" alt="MCQLala" class="logo-box">
            <div class="brand-text">
                <h1>mcqlala.in</h1>
            </div>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
            <i class="fa-solid fa-moon"></i> <span class="theme-label">Dark</span>
        </button>
        <a href="index.html" class="btn-secondary" style="margin-left: auto; text-decoration: none; padding: 10px 20px; border-radius: 8px;">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </nav>

    <div class="main-container">
        <div class="custom-quiz-builder">
            <!-- Step Indicator -->
            <div class="setup-steps">
                <div class="setup-step active" id="step1Indicator">
                    <div class="setup-step-number">1</div>
                    <span class="setup-step-label">Subjects</span>
                </div>
                <div class="setup-step" id="step2Indicator">
                    <div class="setup-step-number">2</div>
                    <span class="setup-step-label">Topics</span>
                </div>
                <div class="setup-step" id="step3Indicator">
                    <div class="setup-step-number">3</div>
                    <span class="setup-step-label">Review</span>
                </div>
            </div>

            <h2 class="setup-page-title">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Build Your Custom Quiz
            </h2>

            <div class="quiz-settings-panel">
                <div class="settings-section">
                    <h3><i class="fa-solid fa-clock"></i> Exam Settings</h3>
                    <div class="settings-row">
                        <div class="setting-group">
                            <label for="examMode">Exam Mode</label>
                            <select id="examMode">
                                <option value="none">Practice Mode (No Timer)</option>
                                <option value="quick">Quick Test (5 min)</option>
                                <option value="standard" selected>Standard Test (30 min)</option>
                                <option value="exam">Exam Simulation (60 min)</option>
                                <option value="custom">Custom Time</option>
                            </select>
                        </div>
                        <div class="setting-group" id="customTimeGroup" style="display: none;">
                            <label for="customTime">Custom Time (minutes)</label>
                            <input type="number" id="customTime" min="1" max="300" value="30" placeholder="Enter minutes">
                        </div>
                        <div class="setting-group">
                            <label for="timePerQuestion">Time Per Question</label>
                            <select id="timePerQuestion">
                                <option value="0">No Limit</option>
                                <option value="30">30 seconds</option>
                                <option value="45">45 seconds</option>
                                <option value="60">1 minute</option>
                                <option value="90">1.5 minutes</option>
                                <option value="120">2 minutes</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="subjects-selector">
                <div class="section-header">
                    <h3><i class="fa-solid fa-layer-group"></i> Select Subjects & Topics</h3>
                    <button class="btn-add-subject" id="addSubjectBtn">
                        <i class="fa-solid fa-plus"></i> Add Subject
                    </button>
                </div>
                
                <div class="subjects-list" id="subjectsList">
                    <!-- Subject cards will be added here dynamically -->
                </div>
            </div>

            <div class="summary-panel">
                <div class="summary-header">
                    <h3><i class="fa-solid fa-clipboard-list"></i> Quiz Summary</h3>
                </div>
                <div class="summary-stats">
                    <div class="stat-item">
                        <span class="stat-label">Subjects Selected:</span>
                        <span class="stat-value" id="subjectCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Topics Selected:</span>
                        <span class="stat-value" id="topicCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total Questions:</span>
                        <span class="stat-value" id="totalQuestions">0</span>
                    </div>
                </div>
            </div>

            <div class="start-quiz-section">
                <button class="btn-start-quiz" id="startCustomQuiz" disabled>
                    <i class="fa-solid fa-play"></i> Create Test Series
                </button>
                <p class="start-hint" id="startHint">Add at least one subject to start</p>
            </div>
        </div>
    </div>

    <style>
        .custom-quiz-builder {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .setup-page-title {
            text-align: center;
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 800;
        }
        
        .quiz-settings-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .settings-section h3 {
            color: var(--text);
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .settings-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .setting-group {
            flex: 1;
            min-width: 150px;
        }
        
        .setting-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .setting-group select,
        .setting-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text);
            font-size: 14px;
        }
        
        .subjects-selector {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-header h3 {
            color: var(--text);
            font-size: 16px;
            margin: 0;
        }
        
        .btn-add-subject {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-add-subject:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }
        
        .subjects-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .no-topics {
            color: var(--text-muted);
            font-size: 13px;
            padding: 10px;
            text-align: center;
            background: var(--bg-card);
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .settings-row {
                flex-direction: column;
            }
        }
    </style>

    <script src="app.js?v=1777000000000" defer></script>
    <script>
        let allSubjects = [];
        let selectedSubjects = [];
        let subjectCounter = 0;

        window.addEventListener('DOMContentLoaded', async () => {
            // Load all subjects
            await loadSubjects();
            
            // Event listeners
            document.getElementById('addSubjectBtn').addEventListener('click', addQuizSubject);
            document.getElementById('examMode').addEventListener('change', toggleCustomTime);
            document.getElementById('startCustomQuiz').addEventListener('click', startCustomQuiz);
            
            // Add first subject automatically
            addQuizSubject();
        });

        async function loadSubjects() {
            try {
                const response = await fetch('/api/subjects');
                if (response.ok) {
                    allSubjects = await response.json();
                }
            } catch (e) {
                console.error('Error loading subjects:', e);
            }
        }

        function toggleCustomTime() {
            const examMode = document.getElementById('examMode').value;
            const customTimeGroup = document.getElementById('customTimeGroup');
            customTimeGroup.style.display = examMode === 'custom' ? 'block' : 'none';
        }

        function addQuizSubject() {
            subjectCounter++;
            const subjectId = `subject_${subjectCounter}`;
            
            const subjectData = {
                id: subjectId,
                name: '',
                topics: []
            };
            
            selectedSubjects.push(subjectData);
            renderSubjectsList();
        }

        function removeSubject(subjectId) {
            selectedSubjects = selectedSubjects.filter(s => s.id !== subjectId);
            renderSubjectsList();
            updateSummary();
        }

        function renderSubjectsList() {
            const container = document.getElementById('subjectsList');
            
            if (selectedSubjects.length === 0) {
                container.innerHTML = `
                    <div class="no-topics" style="text-align:center; padding: 40px 20px;">
                        <i class="fa-solid fa-layer-group" style="font-size: 40px; color: var(--text-muted); margin-bottom: 15px; display:block;"></i>
                        <p style="font-size: 16px; color: var(--text-muted); margin: 0;">Click <strong>"Add Subject"</strong> to start building your quiz</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = selectedSubjects.map(subject => {
                const availableSubjects = allSubjects.filter(s => 
                    !selectedSubjects.some(sel => sel.id !== subject.id && sel.name === s.name)
                );
                const hasSubject = !!subject.name;
                
                return `
                    <div class="subject-card${hasSubject ? ' has-subject' : ''}" id="${subject.id}">
                        <div class="subject-card-header">
                            <div class="subject-name-select">
                                <select onchange="updateSubject('${subject.id}', this.value)">
                                    <option value="">— Select a Subject —</option>
                                    ${availableSubjects.map(s => `
                                        <option value="${s.name}" ${subject.name === s.name ? 'selected' : ''}>
                                            ${s.name}
                                        </option>
                                    `).join('')}
                                </select>
                            </div>
                            <button class="btn-remove-subject" onclick="removeSubject('${subject.id}')" title="Remove subject">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div class="topics-grid" id="topics_${subject.id}">
                            ${renderTopics(subject)}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderTopics(subject) {
            if (!subject.name) {
                return `<div class="no-topics">Select a subject to see topics</div>`;
            }
            
            const subjectData = allSubjects.find(s => s.name === subject.name);
            
            if (!subjectData || !subjectData.topics || subjectData.topics.length === 0) {
                return `<div class="no-topics">No topics available for this subject</div>`;
            }
            
            return subjectData.topics.map(topic => {
                const topicName = topic.name || topic;
                const topicData = subject.topics.find(t => t.name === topicName);
                const isSelected = topicData ? topicData.selected : false;
                const mcqCount = topicData ? topicData.mcqCount : 10;
                const safeId = `t_${subject.id}_${topicName.replace(/[^a-zA-Z0-9]/g, '_')}`;
                
                return `
                    <div class="topic-item${isSelected ? ' selected' : ''}" 
                         id="topicItem_${safeId}"
                         onclick="toggleTopicFromItem('${subject.id}', '${topicName}', ${isSelected})">
                        <div class="topic-check">
                            ${isSelected ? '<i class="fa-solid fa-check"></i>' : ''}
                        </div>
                        <span class="topic-name">${topicName}</span>
                        <div class="mcq-stepper" id="stepper_${safeId}">
                            <button class="stepper-btn" onclick="event.stopPropagation(); decMcq('${subject.id}', '${topicName}')">
                                <i class="fa-solid fa-minus"></i>
                            </button>
                            <span class="stepper-value" id="mcqVal_${safeId}">${mcqCount}</span>
                            <button class="stepper-btn" onclick="event.stopPropagation(); incMcq('${subject.id}', '${topicName}')">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateSubject(subjectId, subjectName) {
            const subject = selectedSubjects.find(s => s.id === subjectId);
            if (subject) {
                subject.name = subjectName;
                subject.topics = [];
                renderSubjectsList();
                updateSummary();
            }
        }

        function toggleTopicFromItem(subjectId, topicName, wasSelected) {
            toggleTopic(subjectId, topicName, !wasSelected);
        }

        function decMcq(subjectId, topicName) {
            const subject = selectedSubjects.find(s => s.id === subjectId);
            if (!subject) return;
            const topic = subject.topics.find(t => t.name === topicName);
            if (topic) {
                const newVal = Math.max(1, (topic.mcqCount || 10) - 5);
                updateTopicMcqCount(subjectId, topicName, newVal);
            }
        }

        function incMcq(subjectId, topicName) {
            const subject = selectedSubjects.find(s => s.id === subjectId);
            if (!subject) return;
            const topic = subject.topics.find(t => t.name === topicName);
            if (topic) {
                const newVal = Math.min(100, (topic.mcqCount || 10) + 5);
                updateTopicMcqCount(subjectId, topicName, newVal);
            }
        }

        function toggleTopic(subjectId, topicName, isSelected) {
            const subject = selectedSubjects.find(s => s.id === subjectId);
            if (!subject) return;
            const safeId = `t_${subjectId}_${topicName.replace(/[^a-zA-Z0-9]/g, '_')}`;
            
            if (isSelected) {
                if (!subject.topics.some(t => t.name === topicName)) {
                    subject.topics.push({ name: topicName, selected: true, mcqCount: 10 });
                }
            } else {
                subject.topics = subject.topics.filter(t => t.name !== topicName);
            }
            
            // Update visual
            const item = document.getElementById(`topicItem_${safeId}`);
            if (item) {
                item.classList.toggle('selected', isSelected);
                const check = item.querySelector('.topic-check');
                if (check) {
                    check.innerHTML = isSelected ? '<i class="fa-solid fa-check"></i>' : '';
                }
            }
            
            updateSummary();
        }

        function updateTopicMcqCount(subjectId, topicName, count) {
            const subject = selectedSubjects.find(s => s.id === subjectId);
            if (!subject) return;
            
            const topic = subject.topics.find(t => t.name === topicName);
            if (topic) {
                topic.mcqCount = parseInt(count) || 10;
                // Update visual
                const safeId = `t_${subjectId}_${topicName.replace(/[^a-zA-Z0-9]/g, '_')}`;
                const valEl = document.getElementById(`mcqVal_${safeId}`);
                if (valEl) valEl.textContent = topic.mcqCount;
                updateSummary();
            }
        }

        function updateSummary() {
            let subjectCount = 0;
            let topicCount = 0;
            let totalQuestions = 0;
            
            selectedSubjects.forEach(subject => {
                if (subject.name) subjectCount++;
                
                subject.topics.forEach(topic => {
                    if (topic.selected) {
                        topicCount++;
                        totalQuestions += topic.mcqCount || 10;
                    }
                });
            });
            
            document.getElementById('subjectCount').innerHTML = subjectCount + '<span class="stat-suffix"></span>';
            document.getElementById('topicCount').innerHTML = topicCount + '<span class="stat-suffix"></span>';
            document.getElementById('totalQuestions').innerHTML = totalQuestions + '<span class="stat-suffix"> Qs</span>';
            
            const startBtn = document.getElementById('startCustomQuiz');
            const hint = document.getElementById('startHint');
            
            if (topicCount > 0 && totalQuestions > 0) {
                startBtn.disabled = false;
                hint.textContent = `${totalQuestions} questions from ${topicCount} topics ready!`;
                hint.style.color = 'var(--correct)';
            } else {
                startBtn.disabled = true;
                hint.textContent = 'Add at least one subject with topics to start';
                hint.style.color = 'var(--text-muted)';
            }
        }

        function startCustomQuiz() {
            const examMode = document.getElementById('examMode').value;
            let totalTime = 0;
            
            if (examMode === 'quick') totalTime = 5 * 60;
            else if (examMode === 'standard') totalTime = 30 * 60;
            else if (examMode === 'exam') totalTime = 60 * 60;
            else if (examMode === 'custom') totalTime = parseInt(document.getElementById('customTime').value) * 60;
            
            const timePerQuestion = parseInt(document.getElementById('timePerQuestion').value) || 0;
            
            // Collect all selected topics and their MCQ counts
            const quizConfig = {
                isCustomQuiz: true,
                subjects: selectedSubjects.filter(s => s.name).map(s => ({
                    name: s.name,
                    topics: s.topics.filter(t => t.selected).map(t => ({
                        name: t.name,
                        count: t.mcqCount
                    }))
                })),
                totalTime,
                timePerQuestion
            };
            
            // Store config and redirect to quiz page
            sessionStorage.setItem('customQuizConfig', JSON.stringify(quizConfig));
            window.location.href = 'quiz.html?custom=true';
        }
    </script>
</body>
</html>
